<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACS Vouillé — Parcours Juillet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap');

  :root {
    --bleu: #1a3a5c;
    --rouge: #c0392b;
    --jaune: #f0a500;
    --gris: #f4f5f7;
    --blanc: #ffffff;
    --texte: #222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--gris);
    color: var(--texte);
  }

  header {
    background: var(--bleu);
    color: white;
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--jaune);
  }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    letter-spacing: 1px;
    line-height: 1;
  }

  header .subtitle {
    font-size: 0.95rem;
    opacity: 0.75;
    margin-top: 4px;
    font-weight: 300;
  }

  header .contact {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    text-align: right;
    opacity: 0.85;
  }

  .mois-titre {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--bleu);
    text-transform: uppercase;
    letter-spacing: 3px;
    padding: 32px 40px 8px;
    border-bottom: 2px solid var(--bleu);
    margin-bottom: 0;
  }

  .depart {
    font-size: 0.9rem;
    color: #666;
    padding: 6px 40px 20px;
    font-style: italic;
  }

  .section-date {
    padding: 10px 40px 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--rouge);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 12px 40px 24px;
  }

  .grid.single {
    grid-template-columns: 1fr;
    max-width: 700px;
  }

  .card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.13);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--bleu);
    color: white;
  }

  .card-header .parcours-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.5px;
  }

  .card-header .km-badge {
    background: var(--jaune);
    color: var(--bleu);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    padding: 3px 12px;
    border-radius: 20px;
  }

  .card-img-wrap {
    cursor: zoom-in;
    overflow: hidden;
    max-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eef0f3;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }

  .card-img-wrap:hover img {
    transform: scale(1.03);
  }

  .hint {
    font-size: 0.75rem;
    color: #999;
    text-align: center;
    padding: 6px;
    background: #fafafa;
  }

  /* LIGHTBOX */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 20, 40, 0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: zoom-out;
  }

  #lightbox.active {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  #lightbox img {
    max-width: 92vw;
    max-height: 85vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    object-fit: contain;
    cursor: default;
  }

  #lightbox-caption {
    color: white;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  #lightbox-close {
    position: fixed;
    top: 18px;
    right: 24px;
    color: white;
    font-size: 2.5rem;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
    background: none;
    border: none;
    font-family: sans-serif;
  }

  #lightbox-close:hover { opacity: 1; }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; padding: 12px 16px 24px; }
    .mois-titre, .depart, .section-date { padding-left: 16px; padding-right: 16px; }
    header { flex-direction: column; gap: 10px; text-align: center; }
    header .contact { text-align: center; }
  }
</style>
</head>
